<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Für Hanni</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Quicksand',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.15), transparent 250px),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,.12), transparent 220px),
    linear-gradient(
        180deg,
        #0f172a 0%,
        #172554 35%,
        #1e293b 100%
    );

    color:white;
}

/* Sternenhimmel */
.stars{
    position:fixed;
    inset:0;
    pointer-events:none;

    background-image:
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(2px 2px at 40px 70px, white, transparent),
        radial-gradient(1px 1px at 90px 40px, white, transparent),
        radial-gradient(2px 2px at 130px 80px, white, transparent),
        radial-gradient(1px 1px at 180px 20px, white, transparent);

    background-size:200px 120px;
    animation:twinkle 8s ease-in-out infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.6;}
    50%{opacity:1;}
}

/* Karte */
.card{
    width:min(90%,580px);

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:32px;
    padding:40px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

/* Dino */
.dino{
    width:180px;
    max-width:60%;
    display:block;
    margin:0 auto 20px;
    animation:bounce 4s ease-in-out infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h1{
    font-size:2.8rem;
    margin-bottom:15px;
}

.subtitle{
    font-size:1rem;
    line-height:1.7;
    opacity:.9;
    margin-bottom:35px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:18px;
    padding:12px 18px;
    font-size:1rem;
    font-family:inherit;
    cursor:pointer;

    background:rgba(255,255,255,.15);
    color:white;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.25);
}

.progress{
    margin-top:25px;
}

input[type="range"]{
    width:100%;
    cursor:pointer;
}

.time{
    margin-top:10px;
    opacity:.8;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

    <img src="dino.png" class="dino" alt="Dino">

    <h1>Für Hanni</h1>

    <p class="subtitle">
        Zum Einschlafen, Wachbleiben, Zugfahrten<br>
        oder immer, wenn die ??? schon zu gruselig ist.
    </p>

    <audio id="audio">
        <source src="fuerhanni.mp3" type="audio/mpeg">
    </audio>

    <div class="controls">
        <button id="back">⏪ 10s</button>
        <button id="play">▶️ Abspielen</button>
        <button id="forward">10s ⏩</button>
    </div>

    <div class="progress">
        <input type="range" id="seekbar" min="0" max="100" value="0">
    </div>

    <div class="time">
        <span id="current">0:00</span> / <span id="duration">0:00</span>
    </div>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const backBtn = document.getElementById("back");
const forwardBtn = document.getElementById("forward");
const seekbar = document.getElementById("seekbar");

const current = document.getElementById("current");
const duration = document.getElementById("duration");

function formatTime(s){
    if(isNaN(s)) return "0:00";
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return m + ":" + String(sec).padStart(2,"0");
}

audio.addEventListener("loadedmetadata", ()=>{
    duration.textContent = formatTime(audio.duration);
});

playBtn.addEventListener("click", async ()=>{
    if(audio.paused){
        await audio.play();
        playBtn.textContent = "⏸️ Pause";
    } else {
        audio.pause();
        playBtn.textContent = "▶️ Abspielen";
    }
});

backBtn.addEventListener("click", ()=>{
    audio.currentTime = Math.max(0, audio.currentTime - 10);
});

forwardBtn.addEventListener("click", ()=>{
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
});

audio.addEventListener("timeupdate", ()=>{
    current.textContent = formatTime(audio.currentTime);
    if(audio.duration){
        seekbar.value = (audio.currentTime / audio.duration) * 100;
    }
});

seekbar.addEventListener("input", ()=>{
    audio.currentTime = (seekbar.value / 100) * audio.duration;
});
</script>

</body>
</html>
